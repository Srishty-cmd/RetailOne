version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: storesync-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - storesync-network

  redis:
    image: redis:latest
    container_name: storesync-redis
    ports:
      - "6379:6379"
    networks:
      - storesync-network

  backend:
    build: ./backend
    container_name: storesync-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/storesync
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your_super_secret_access_token_key_12345
      - JWT_REFRESH_SECRET=your_super_secret_refresh_token_key_54321
      - NODE_ENV=development
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - storesync-network

  frontend:
    build: ./frontend
    container_name: storesync-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_URL=http://backend:5000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - storesync-network

volumes:
  mongodb_data:

networks:
  storesync-network:
    driver: bridge
